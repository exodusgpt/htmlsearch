services:
  - type: web
    name: amazon-fresh-price-agent
    runtime: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm run render:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MAX_CONCURRENT_AMAZON_JOBS
        value: 1
      - key: RATE_LIMIT_MAX_SCANS
        value: 8
      - key: SCAN_PASSWORD
        sync: false
